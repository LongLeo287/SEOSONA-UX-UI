<!-- Responsive Data Table with Sticky Header
     UX-UI System — 4_LIBRARY/components/data-display/data-table.html
-->

<style>
  .table-container {
    max-width: 1000px;
    margin: 2rem auto;
    font-family: var(--font-body, 'Inter', sans-serif);
    background: var(--color-bg-base, #FFFFFF);
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-lg, 0.75rem);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  
  /* Table Header Controls */
  .table-toolbar {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--color-border, #E2E8F0);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--color-bg-base, #FFFFFF);
  }
  .table-title {
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--color-text-primary, #04091A);
  }
  .table-actions {
    display: flex;
    gap: 0.75rem;
  }
  .search-input {
    padding: 0.5rem 1rem;
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--color-accent, #1D4ED8); }

  /* Table Wrapper for scroll */
  .table-wrapper {
    width: 100%;
    max-height: 400px; /* enables sticky header */
    overflow: auto;
  }
  
  .data-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    white-space: nowrap;
  }

  /* Sticky Header */
  .data-table th {
    position: sticky;
    top: 0;
    background: var(--color-bg-surface, #F8FAFC);
    padding: 0.875rem 1.5rem;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text-muted, #94A3B8);
    border-bottom: 1px solid var(--color-border, #E2E8F0);
    z-index: 10;
  }
  
  /* Sortable columns */
  .th-sortable { cursor: pointer; transition: color 0.2s; }
  .th-sortable:hover { color: var(--color-text-primary, #04091A); }
  .th-sortable::after {
    content: '↕';
    margin-left: 0.5rem;
    opacity: 0.3;
  }
  
  /* Table Body */
  .data-table td {
    padding: 1rem 1.5rem;
    font-size: 0.875rem;
    color: var(--color-text-body, #64748B);
    border-bottom: 1px solid var(--color-border, #E2E8F0);
  }
  .data-table tbody tr {
    transition: background 0.2s;
  }
  .data-table tbody tr:hover {
    background: var(--color-bg-surface, #F8FAFC);
  }
  .data-table tbody tr:last-child td {
    border-bottom: none;
  }

  /* Specific Cell Styles */
  .cell-primary {
    font-weight: 600;
    color: var(--color-text-primary, #04091A);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--color-border, #E2E8F0);
    object-fit: cover;
  }
  
  /* Status Badges */
  .status-badge {
    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.625rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .status-active { background: #ECFDF5; color: #059669; }
  .status-pending { background: #FFFBEB; color: #D97706; }
  .status-inactive { background: #F1F5F9; color: #475569; }
  
  /* Action Button */
  .btn-icon {
    background: transparent;
    border: none;
    color: var(--color-text-muted, #94A3B8);
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-icon:hover { color: var(--color-text-primary, #04091A); background: var(--color-border, #E2E8F0); }
</style>
