<!-- Toast / Snackbar Notifications
     UX-UI System — 4_LIBRARY/components/feedback/toast-notifications.html
-->

<style>
  /* Toast Container - fixed to bottom right */
  .toast-container {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    z-index: 9999;
    font-family: var(--font-body, 'Inter', sans-serif);
    pointer-events: none; /* Let clicks pass through container */
  }

  /* Individual Toast */
  .toast {
    width: 350px;
    background: var(--color-bg-base, #FFFFFF);
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-lg, 0.75rem);
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    pointer-events: auto; /* Re-enable clicks for the toast itself */
    position: relative;
    overflow: hidden;
    
    /* Animation */
    transform: translateX(120%);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease;
  }

  .toast.show {
    transform: translateX(0);
    opacity: 1;
  }
  
  /* Hiding animation */
  .toast.hide {
    transform: translateX(120%);
    opacity: 0;
  }

  /* Variants */
  .toast-success .toast-icon { color: #10B981; }
  .toast-error .toast-icon { color: #EF4444; }
  .toast-info .toast-icon { color: #3B82F6; }

  .toast-icon {
    flex-shrink: 0;
    margin-top: 2px;
  }

  .toast-content {
    flex-grow: 1;
  }

  .toast-title {
    font-weight: 600;
    font-size: 0.9375rem;
    color: var(--color-text-primary, #04091A);
    margin-bottom: 0.25rem;
  }

  .toast-message {
    font-size: 0.875rem;
    color: var(--color-text-body, #64748B);
    line-height: 1.4;
  }

  .toast-close {
    background: transparent;
    border: none;
    color: var(--color-text-muted, #94A3B8);
    cursor: pointer;
    padding: 0.25rem;
    margin: -0.25rem;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .toast-close:hover { background: var(--color-bg-surface, #F8FAFC); color: var(--color-text-primary, #04091A); }

  /* Optional Progress Bar for Auto-dismiss */
  .toast-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: var(--color-text-muted, #94A3B8);
    width: 100%;
    transform-origin: left;
    animation: shrink linear forwards;
  }
  
  .toast-success .toast-progress { background: #10B981; }
  .toast-error .toast-progress { background: #EF4444; }
  .toast-info .toast-progress { background: #3B82F6; }

  @keyframes shrink {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }

  /* Demo UI */
  .demo-controls { padding: 2rem; display: flex; gap: 1rem; }
  .btn { padding: 0.5rem 1rem; cursor: pointer; border-radius: 0.5rem; border: 1px solid #E2E8F0; background: #fff; font-weight: 600; }
</style>

<div class="demo-controls">
  <button class="btn" onclick="showToast('success')">Show Success</button>
  <button class="btn" onclick="showToast('error')">Show Error</button>
  <button class="btn" onclick="showToast('info')">Show Info</button>
</div>

<!-- Container where toasts will be injected -->
<div class="toast-container" id="toast-container"></div>

<script>
  // Simple Toast Manager
  const icons = {
    success: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };

  const titles = {
    success: 'Successfully saved',
    error: 'Update failed',
    info: 'New update available'
  };

  const messages = {
    success: 'Your changes have been saved to the database.',
    error: 'There was a problem processing your request. Please try again.',
    info: 'A new version of the application is available. Refresh to update.'
  };

  function showToast(type) {
    const container = document.getElementById('toast-container');
    const duration = 5000; // 5 seconds

    // Create toast element
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    
    toast.innerHTML = `
      <div class="toast-icon">
        ${icons[type]}
      </div>
      <div class="toast-content">
        <div class="toast-title">${titles[type]}</div>
        <div class="toast-message">${messages[type]}</div>
      </div>
      <button class="toast-close" aria-label="Close notification">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="toast-progress" style="animation-duration: ${duration}ms"></div>
    `;

    container.appendChild(toast);

    // Trigger animation
    requestAnimationFrame(() => {
      toast.classList.add('show');
    });

    // Close button logic
    const closeBtn = toast.querySelector('.toast-close');
    closeBtn.addEventListener('click', () => removeToast(toast));

    // Auto dismiss
    setTimeout(() => {
      if (document.body.contains(toast)) {
        removeToast(toast);
      }
    }, duration);
  }

  function removeToast(toast) {
    toast.classList.remove('show');
    toast.classList.add('hide');
    // Wait for animation to finish before removing from DOM
    setTimeout(() => {
      if (document.body.contains(toast)) {
        toast.remove();
      }
    }, 400);
  }
</script>
