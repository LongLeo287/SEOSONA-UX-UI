<!-- CSS-only Tooltips
     UX-UI System — 4_LIBRARY/components/interactive/tooltip.html
-->

<style>
  /* Base structural styling for demo */
  .demo-wrapper { 
    font-family: var(--font-body, 'Inter', sans-serif); 
    padding: 4rem; 
    display: flex; 
    gap: 2rem; 
    justify-content: center;
  }

  /* 
   * Tooltip Core 
   * Uses data-tooltip attribute. CSS only. No JS required.
   */
  [data-tooltip] {
    position: relative;
    cursor: help;
    display: inline-block;
  }

  /* Tooltip Box */
  [data-tooltip]::before {
    content: attr(data-tooltip);
    position: absolute;
    width: max-content;
    max-width: 250px;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius-sm, 0.375rem);
    background: var(--color-text-primary, #04091A);
    color: #FFFFFF;
    font-size: 0.75rem;
    font-weight: 500;
    line-height: 1.4;
    text-align: center;
    white-space: normal;
    z-index: 100;
    
    /* Animation / Visibility */
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
  }

  /* Tooltip Arrow */
  [data-tooltip]::after {
    content: '';
    position: absolute;
    border: 5px solid transparent;
    z-index: 100;
    
    /* Animation / Visibility */
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
  }

  /* Hover States */
  [data-tooltip]:hover::before,
  [data-tooltip]:hover::after,
  [data-tooltip]:focus-visible::before,
  [data-tooltip]:focus-visible::after {
    opacity: 1;
    visibility: visible;
  }

  /* 
   * Top Tooltip (Default)
   */
  [data-tooltip]:not([data-tooltip-pos])::before,
  [data-tooltip][data-tooltip-pos="top"]::before {
    bottom: 100%;
    left: 50%;
    transform: translate(-50%, -5px);
    margin-bottom: 8px;
  }
  [data-tooltip]:not([data-tooltip-pos])::after,
  [data-tooltip][data-tooltip-pos="top"]::after {
    bottom: 100%;
    left: 50%;
    transform: translate(-50%, 0);
    margin-bottom: -2px; /* Pull arrow down to touch element */
    border-top-color: var(--color-text-primary, #04091A);
  }
  
  [data-tooltip]:not([data-tooltip-pos]):hover::before,
  [data-tooltip][data-tooltip-pos="top"]:hover::before {
    transform: translate(-50%, 0);
  }
  [data-tooltip]:not([data-tooltip-pos]):hover::after,
  [data-tooltip][data-tooltip-pos="top"]:hover::after {
    transform: translate(-50%, 5px);
  }

  /* 
   * Bottom Tooltip
   */
  [data-tooltip][data-tooltip-pos="bottom"]::before {
    top: 100%;
    left: 50%;
    transform: translate(-50%, 5px);
    margin-top: 8px;
  }
  [data-tooltip][data-tooltip-pos="bottom"]::after {
    top: 100%;
    left: 50%;
    transform: translate(-50%, 0);
    margin-top: -2px;
    border-bottom-color: var(--color-text-primary, #04091A);
  }
  
  [data-tooltip][data-tooltip-pos="bottom"]:hover::before {
    transform: translate(-50%, 0);
  }
  [data-tooltip][data-tooltip-pos="bottom"]:hover::after {
    transform: translate(-50%, -5px);
  }

  /* 
   * Right Tooltip
   */
  [data-tooltip][data-tooltip-pos="right"]::before {
    top: 50%;
    left: 100%;
    transform: translate(5px, -50%);
    margin-left: 8px;
  }
  [data-tooltip][data-tooltip-pos="right"]::after {
    top: 50%;
    left: 100%;
    transform: translate(0, -50%);
    margin-left: -2px;
    border-right-color: var(--color-text-primary, #04091A);
  }
  
  [data-tooltip][data-tooltip-pos="right"]:hover::before {
    transform: translate(0, -50%);
  }
  [data-tooltip][data-tooltip-pos="right"]:hover::after {
    transform: translate(-5px, -50%);
  }

  /* Base styling for elements just for demo */
  .demo-btn {
    padding: 0.5rem 1rem;
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-md, 0.5rem);
    background: #FFFFFF;
    color: var(--color-text-primary, #04091A);
    font-weight: 600;
  }
</style>

<div class="demo-wrapper">
  
  <button class="demo-btn" tabindex="0" data-tooltip="This is a top tooltip by default.">Hover Top</button>
  
  <button class="demo-btn" tabindex="0" data-tooltip="Here is some extra information on the bottom!" data-tooltip-pos="bottom">Hover Bottom</button>
  
  <button class="demo-btn" tabindex="0" data-tooltip="A tooltip on the right side." data-tooltip-pos="right">Hover Right</button>

  <span data-tooltip="You can put tooltips on inline text too!" style="border-bottom: 1px dashed #94A3B8; color: #1D4ED8;">Inline Text Tooltip</span>

</div>
