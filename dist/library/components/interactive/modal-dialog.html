<!-- Modal Dialog (Accessible)
     UX-UI System — 4_LIBRARY/components/interactive/modal-dialog.html
-->

<style>
  /* Base structural styling for demo */
  .demo-wrapper { font-family: var(--font-body, 'Inter', sans-serif); padding: 2rem; }

  /* Modal Overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4, 9, 26, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    
    /* Animation defaults */
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  
  .modal-overlay.is-open {
    opacity: 1;
    visibility: visible;
  }

  /* Modal Window */
  .modal-dialog {
    background: var(--color-bg-base, #FFFFFF);
    border-radius: var(--radius-xl, 1rem);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    width: 100%;
    max-width: 500px;
    position: relative;
    
    /* Animation defaults */
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  
  .modal-overlay.is-open .modal-dialog {
    transform: scale(1) translateY(0);
  }

  /* Modal Content */
  .modal-header {
    padding: 1.5rem 1.5rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-family: var(--font-heading, 'Poppins', sans-serif);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-text-primary, #04091A);
    margin: 0;
  }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--color-text-muted, #94A3B8);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .modal-close:hover {
    background: var(--color-bg-surface, #F8FAFC);
    color: var(--color-text-primary, #04091A);
  }

  .modal-body {
    padding: 0 1.5rem 1.5rem;
    color: var(--color-text-body, #64748B);
    font-size: 0.9375rem;
    line-height: 1.6;
  }

  .modal-footer {
    padding: 1rem 1.5rem 1.5rem;
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
  }
  
  /* Buttons */
  .btn {
    padding: 0.625rem 1.25rem;
    border-radius: var(--radius-md, 0.5rem);
    font-weight: 600;
    font-size: 0.9375rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .btn-ghost {
    background: transparent;
    color: var(--color-text-body, #64748B);
  }
  .btn-ghost:hover { background: var(--color-bg-surface, #F8FAFC); color: var(--color-text-primary, #04091A); }
  .btn-primary {
    background: var(--color-accent, #1D4ED8);
    color: #FFFFFF;
  }
  .btn-primary:hover { background: #1e3a8a; } /* darker blue */
  .btn-danger {
    background: #EF4444;
    color: #FFFFFF;
  }
  .btn-danger:hover { background: #DC2626; }
</style>

<div class="demo-wrapper">
  <button class="btn btn-primary" id="open-modal-btn">Open Modal</button>
</div>

<!-- Accessible Modal Structure -->
<div class="modal-overlay" id="example-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <!-- Use a div to catch clicks outside the modal to close it -->
  <div class="modal-backdrop" data-close-modal style="position: absolute; inset: 0;"></div>
  
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Deactivate Account</h3>
      <button class="modal-close" data-close-modal aria-label="Close modal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <div class="modal-body">
      Are you sure you want to deactivate your account? All of your data will be permanently removed from our servers forever. This action cannot be undone.
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Cancel</button>
      <button class="btn btn-danger" onclick="alert('Account deactivated!')">Deactivate</button>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('example-modal');
    const openBtn = document.getElementById('open-modal-btn');
    const closeTriggers = modal.querySelectorAll('[data-close-modal]');
    
    // Focus management
    let previouslyFocusedElement;

    function openModal() {
      previouslyFocusedElement = document.activeElement;
      modal.classList.add('is-open');
      modal.setAttribute('aria-hidden', 'false');
      
      // Focus first focusable element inside modal (usually the close button)
      setTimeout(() => {
        modal.querySelector('button').focus();
      }, 100);
      
      // Prevent body scrolling
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden', 'true');
      
      // Restore focus
      if (previouslyFocusedElement) previouslyFocusedElement.focus();
      
      // Restore body scrolling
      document.body.style.overflow = '';
    }

    // Event Listeners
    openBtn.addEventListener('click', openModal);
    
    closeTriggers.forEach(trigger => {
      trigger.addEventListener('click', closeModal);
    });

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('is-open')) {
        closeModal();
      }
    });
  });
</script>
