<!-- Offcanvas Drawer (Side Panel)
     UX-UI System — 4_LIBRARY/components/interactive/offcanvas-drawer.html
-->

<style>
  /* Base structural styling for demo */
  .demo-wrapper { font-family: var(--font-body, 'Inter', sans-serif); padding: 2rem; display: flex; gap: 1rem; }

  /* Drawer Overlay */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4, 9, 26, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  
  .drawer-overlay.is-open {
    opacity: 1;
    visibility: visible;
  }

  /* Drawer Panel */
  .drawer-panel {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 100%;
    max-width: 400px;
    background: var(--color-bg-base, #FFFFFF);
    box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
    z-index: 1001;
    display: flex;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* Right Drawer (Default) */
  .drawer-right {
    right: 0;
    transform: translateX(100%);
  }
  .drawer-overlay.is-open .drawer-right { transform: translateX(0); }

  /* Left Drawer */
  .drawer-left {
    left: 0;
    transform: translateX(-100%);
    box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
  }
  .drawer-overlay.is-open .drawer-left { transform: translateX(0); }

  /* Drawer Content */
  .drawer-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--color-border, #E2E8F0);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .drawer-title {
    font-family: var(--font-heading, 'Poppins', sans-serif);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-text-primary, #04091A);
    margin: 0;
  }
  .drawer-close {
    background: transparent;
    border: none;
    color: var(--color-text-muted, #94A3B8);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .drawer-close:hover {
    background: var(--color-bg-surface, #F8FAFC);
    color: var(--color-text-primary, #04091A);
  }

  .drawer-body {
    padding: 1.5rem;
    flex-grow: 1;
    overflow-y: auto;
    color: var(--color-text-body, #64748B);
    font-size: 0.9375rem;
    line-height: 1.6;
  }

  .drawer-footer {
    padding: 1.5rem;
    border-top: 1px solid var(--color-border, #E2E8F0);
    background: var(--color-bg-surface, #F8FAFC);
  }
  
  /* Buttons */
  .btn {
    padding: 0.625rem 1.25rem;
    border-radius: var(--radius-md, 0.5rem);
    font-weight: 600;
    font-size: 0.9375rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    width: 100%;
  }
  .btn-primary {
    background: var(--color-accent, #1D4ED8);
    color: #FFFFFF;
  }
  .btn-primary:hover { background: #1e3a8a; }
  .btn-outline {
    background: transparent;
    border-color: var(--color-border, #E2E8F0);
    color: var(--color-text-primary, #04091A);
  }
</style>

<div class="demo-wrapper">
  <button class="btn btn-outline" style="width:auto" onclick="openDrawer('drawer-demo-left')">Open Left Drawer</button>
  <button class="btn btn-primary" style="width:auto" onclick="openDrawer('drawer-demo-right')">Open Right Drawer</button>
</div>

<!-- Left Drawer -->
<div class="drawer-overlay" id="drawer-demo-left" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="drawer-title-left">
  <div class="drawer-backdrop" data-close-drawer style="position: absolute; inset: 0;"></div>
  
  <div class="drawer-panel drawer-left">
    <div class="drawer-header">
      <h3 class="drawer-title" id="drawer-title-left">Navigation</h3>
      <button class="drawer-close" data-close-drawer aria-label="Close drawer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <div class="drawer-body">
      <p>Perfect for mobile navigation menus or complex filtering options on e-commerce sites.</p>
    </div>
  </div>
</div>

<!-- Right Drawer -->
<div class="drawer-overlay" id="drawer-demo-right" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="drawer-title-right">
  <div class="drawer-backdrop" data-close-drawer style="position: absolute; inset: 0;"></div>
  
  <div class="drawer-panel drawer-right">
    <div class="drawer-header">
      <h3 class="drawer-title" id="drawer-title-right">Shopping Cart</h3>
      <button class="drawer-close" data-close-drawer aria-label="Close drawer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <div class="drawer-body">
      <p>Your cart is currently empty.</p>
      <!-- Example content -->
      <div style="height: 1000px; background: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 10px, #ffffff 10px, #ffffff 20px); margin-top: 2rem; border: 1px dashed #e2e8f0; border-radius: 8px;">
        <p style="padding: 1rem; text-align: center; color: #94a3b8;">Scrollable area test</p>
      </div>
    </div>

    <div class="drawer-footer">
      <button class="btn btn-primary">Checkout</button>
    </div>
  </div>
</div>

<script>
  // Simple drawer manager
  let activeDrawer = null;
  let prevFocus = null;

  function openDrawer(id) {
    const drawer = document.getElementById(id);
    if (!drawer) return;
    
    prevFocus = document.activeElement;
    drawer.classList.add('is-open');
    drawer.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    activeDrawer = drawer;

    // Focus close button
    setTimeout(() => {
      drawer.querySelector('.drawer-close').focus();
    }, 100);
  }

  function closeDrawer() {
    if (!activeDrawer) return;
    
    activeDrawer.classList.remove('is-open');
    activeDrawer.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    
    if (prevFocus) prevFocus.focus();
    activeDrawer = null;
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Bind all close buttons and backdrops
    const closeTriggers = document.querySelectorAll('[data-close-drawer]');
    closeTriggers.forEach(trigger => {
      trigger.addEventListener('click', closeDrawer);
    });

    // Close on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && activeDrawer) {
        closeDrawer();
      }
    });
  });
</script>
