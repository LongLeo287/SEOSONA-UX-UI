<!--
  Component: Hero — Centered
  Type: hero
  Variant: centered (text centered, full-width grid background)
  Version: 1.0
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Centered — Component Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@4.0.0/lib/anime.iife.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { color: inherit; text-decoration: none; }

    :root {
      --color-bg-base:      #FFFFFF;
      --color-text-primary: #04091A;
      --color-text-body:    #64748B;
      --color-text-muted:   #94A3B8;
      --color-accent:       #1D4ED8;
      --color-accent-hover: #2563EB;
      --color-accent-light: #EFF6FF;
      --color-border:       #E2E8F0;
      --color-bg-inverted:  #04091A;
      --font-heading: 'Poppins', sans-serif;
      --font-body:    'Inter', sans-serif;
      --shadow-hover: 0 20px 40px -10px rgb(29 78 216 / 0.2);
      --transition:   all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body { font-family: var(--font-body); background: var(--color-bg-base); -webkit-font-smoothing: antialiased; }

    /* ─── Hero ─────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
      background: var(--color-bg-base);
    }

    /* Grid background */
    .hero__bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--color-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--color-border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
    }

    /* Top glow */
    .hero__bg-glow {
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse, rgb(29 78 216 / 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Fade edges */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(to bottom, transparent, var(--color-bg-base));
      pointer-events: none;
    }

    .hero__content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Badge */
    .hero__badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 1rem 0.375rem 0.625rem;
      background: var(--color-accent-light);
      border: 1px solid #BFDBFE;
      border-radius: 9999px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 1.75rem;
      opacity: 0;
    }
    .badge__dot {
      width: 6px; height: 6px;
      background: var(--color-accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Headline */
    .hero__headline {
      font-family: var(--font-heading);
      font-size: clamp(2.75rem, 6vw, 4.5rem);
      font-weight: 900;
      color: var(--color-text-primary);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      opacity: 0;
    }
    .hero__headline .gradient-text {
      background: linear-gradient(135deg, var(--color-accent) 0%, #7C3AED 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Sub */
    .hero__sub {
      font-size: clamp(1rem, 2vw, 1.1875rem);
      line-height: 1.7;
      color: var(--color-text-body);
      max-width: 560px;
      margin: 0 auto 2.5rem;
      opacity: 0;
    }

    /* Actions */
    .hero__actions {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3.5rem;
      opacity: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-body);
      font-weight: 600;
      border-radius: 9999px;
      transition: var(--transition);
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
      border: none;
    }
    .btn--lg { padding: 0.875rem 1.875rem; font-size: 1rem; }
    .btn--primary {
      background: var(--color-bg-inverted);
      color: #FFFFFF;
    }
    .btn--primary:hover {
      background: var(--color-accent);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .btn--ghost {
      background: transparent;
      color: var(--color-text-primary);
      border: 1.5px solid var(--color-border);
    }
    .btn--ghost:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      transform: translateY(-2px);
    }

    /* Social proof avatars */
    .hero__proof {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      opacity: 0;
    }
    .avatars {
      display: flex;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 9999px;
      border: 2px solid var(--color-bg-base);
      background: var(--color-accent-light);
      color: var(--color-accent);
      font-size: 0.6875rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -10px;
    }
    .avatar:first-child { margin-left: 0; }
    .hero__proof-text {
      font-size: 0.875rem;
      color: var(--color-text-body);
    }
    .hero__proof-text strong {
      color: var(--color-text-primary);
      font-weight: 700;
    }
    .stars { color: #F59E0B; font-size: 0.875rem; letter-spacing: 1px; }

    @media (max-width: 640px) {
      .hero__actions { flex-direction: column; align-items: center; }
      .btn--lg { width: 100%; justify-content: center; max-width: 320px; }
    }
  </style>
</head>
<body>
<section class="hero" id="hero" aria-labelledby="hero-headline">
  <div class="hero__bg-grid" aria-hidden="true"></div>
  <div class="hero__bg-glow" aria-hidden="true"></div>

  <div class="hero__content">
    <div class="hero__badge" id="hero-badge">
      <span class="badge__dot" aria-hidden="true"></span>
      New: AI-powered workflow automation
    </div>

    <h1 class="hero__headline" id="hero-headline">
      Build better products<br>
      <span class="gradient-text">10× faster</span>
    </h1>

    <p class="hero__sub" id="hero-sub">
      The all-in-one platform that helps teams design, build, and ship
      exceptional digital experiences — without the complexity.
    </p>

    <div class="hero__actions" id="hero-actions">
      <a href="#" class="btn btn--primary btn--lg">
        Start for free
        <i data-lucide="arrow-right" style="width:18px;height:18px;" aria-hidden="true"></i>
      </a>
      <a href="#" class="btn btn--ghost btn--lg">
        Watch demo
        <i data-lucide="play-circle" style="width:18px;height:18px;" aria-hidden="true"></i>
      </a>
    </div>

    <div class="hero__proof" id="hero-proof">
      <div class="avatars" aria-hidden="true">
        <div class="avatar">JK</div>
        <div class="avatar">SM</div>
        <div class="avatar">AL</div>
        <div class="avatar">+</div>
      </div>
      <div>
        <div class="stars" aria-hidden="true">★★★★★</div>
        <p class="hero__proof-text"><strong>2,400+ teams</strong> already growing</p>
      </div>
    </div>
  </div>
</section>

<script>
  const { createTimeline } = anime;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (!reduced) {
    const tl = createTimeline({ defaults: { easing: 'easeOutQuart' } });
    tl.add('#hero-badge',   { opacity: [0, 1], translateY: [20, 0], duration: 500 })
      .add('#hero-headline',{ opacity: [0, 1], translateY: [30, 0], duration: 700 }, 100)
      .add('#hero-sub',     { opacity: [0, 1], translateY: [20, 0], duration: 500 }, 250)
      .add('#hero-actions', { opacity: [0, 1], translateY: [16, 0], duration: 500 }, 380)
      .add('#hero-proof',   { opacity: [0, 1], translateY: [12, 0], duration: 400 }, 500);
  } else {
    ['#hero-badge','#hero-headline','#hero-sub','#hero-actions','#hero-proof'].forEach(id => {
      document.querySelector(id).style.opacity = '1';
    });
  }

  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
