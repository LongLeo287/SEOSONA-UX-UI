<!-- Floating Labels Inputs (Material Design Style)
     UX-UI System — 4_LIBRARY/components/forms/floating-labels.html
-->

<style>
  .form-container {
    max-width: 400px;
    margin: 2rem auto;
    font-family: var(--font-body, 'Inter', sans-serif);
  }

  .floating-group {
    position: relative;
    margin-bottom: 2rem;
  }
  
  .floating-input {
    width: 100%;
    padding: 1rem 1rem 0.5rem;
    font-size: 1rem;
    color: var(--color-text-primary, #04091A);
    background: transparent;
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-md, 0.5rem);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    /* Needs to be empty initially, required attribute handles validity */
  }
  
  .floating-label {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    color: var(--color-text-muted, #94A3B8);
    pointer-events: none;
    transition: 0.2s ease all;
    background: #FFFFFF; /* Match container bg */
    padding: 0 0.25rem;
  }

  /* Active state logic */
  .floating-input:focus,
  .floating-input:not(:placeholder-shown) {
    border-color: var(--color-accent, #1D4ED8);
    box-shadow: 0 0 0 1px var(--color-accent, #1D4ED8);
  }

  .floating-input:focus ~ .floating-label,
  .floating-input:not(:placeholder-shown) ~ .floating-label {
    top: 0;
    font-size: 0.75rem;
    color: var(--color-accent, #1D4ED8);
    font-weight: 600;
  }

  .floating-input:not(:focus):not(:placeholder-shown) ~ .floating-label {
    color: var(--color-text-muted, #94A3B8); /* Returns to gray when filled but unfocused */
  }

  /* Filled variant (alternative style) */
  .floating-group--filled .floating-input {
    background: var(--color-bg-surface, #F8FAFC);
    border: none;
    border-bottom: 2px solid var(--color-border, #E2E8F0);
    border-radius: 4px 4px 0 0;
    padding-top: 1.25rem;
    padding-bottom: 0.25rem;
  }
  .floating-group--filled .floating-label {
    background: transparent;
    top: 50%;
  }
  .floating-group--filled .floating-input:focus,
  .floating-group--filled .floating-input:not(:placeholder-shown) {
    box-shadow: none;
    border-color: var(--color-accent, #1D4ED8);
  }
  .floating-group--filled .floating-input:focus ~ .floating-label,
  .floating-group--filled .floating-input:not(:placeholder-shown) ~ .floating-label {
    top: 0.75rem;
  }

</style>

<div class="form-container">
  <h3>Outlined Style</h3>
  
  <div class="floating-group">
    <!-- placeholder=" " is the CSS trick that makes :placeholder-shown work reliably -->
    <input type="text" id="fname" class="floating-input" placeholder=" " required>
    <label for="fname" class="floating-label">First Name</label>
  </div>

  <div class="floating-group">
    <input type="email" id="email" class="floating-input" placeholder=" " required>
    <label for="email" class="floating-label">Email Address</label>
  </div>

  <br><br>
  <h3>Filled Style</h3>

  <div class="floating-group floating-group--filled">
    <input type="text" id="company" class="floating-input" placeholder=" " required>
    <label for="company" class="floating-label">Company Name</label>
  </div>
</div>
