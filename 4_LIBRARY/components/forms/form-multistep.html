<!-- Multi-Step Wizard Form
     UX-UI System — 4_LIBRARY/components/forms/form-multistep.html
-->

<style>
  .wizard-container {
    max-width: 600px;
    margin: 0 auto;
    font-family: var(--font-body, 'Inter', sans-serif);
    background: var(--color-bg-base, #FFFFFF);
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-xl, 1.25rem);
    overflow: hidden;
  }
  
  /* Progress Bar */
  .wizard-header {
    background: var(--color-bg-surface, #F8FAFC);
    padding: 2rem;
    border-bottom: 1px solid var(--color-border, #E2E8F0);
  }
  .wizard-progress {
    display: flex;
    justify-content: space-between;
    position: relative;
    margin-bottom: 1rem;
  }
  .wizard-progress::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--color-border, #E2E8F0);
    transform: translateY(-50%);
    z-index: 1;
  }
  .wizard-progress-bar {
    position: absolute;
    top: 50%;
    left: 0;
    height: 2px;
    background: var(--color-accent, #1D4ED8);
    transform: translateY(-50%);
    z-index: 2;
    transition: width 0.4s ease;
  }
  .step-indicator {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--color-border, #E2E8F0);
    color: var(--color-text-muted, #94A3B8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.875rem;
    position: relative;
    z-index: 3;
    transition: all 0.4s ease;
  }
  .step-indicator.active {
    background: var(--color-accent, #1D4ED8);
    color: #FFFFFF;
    box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.2);
  }
  .step-indicator.completed {
    background: var(--color-accent, #1D4ED8);
    color: #FFFFFF;
  }
  .wizard-title {
    font-family: var(--font-heading, 'Poppins', sans-serif);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-text-primary, #04091A);
    text-align: center;
  }

  /* Form Body */
  .wizard-body {
    padding: 2.5rem 2rem;
    position: relative;
    min-height: 300px;
  }
  .wizard-step {
    display: none;
    animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .wizard-step.active {
    display: block;
  }
  
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Form Elements (Standardized) */
  .form-group { margin-bottom: 1.5rem; }
  .form-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-text-primary, #04091A);
    margin-bottom: 0.5rem;
  }
  .form-control {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-md, 0.5rem);
    font-size: 0.9375rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--color-accent, #1D4ED8);
    box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
  }
  
  /* Footer / Buttons */
  .wizard-footer {
    padding: 1.5rem 2rem;
    background: var(--color-bg-surface, #F8FAFC);
    border-top: 1px solid var(--color-border, #E2E8F0);
    display: flex;
    justify-content: space-between;
  }
  .btn {
    padding: 0.625rem 1.25rem;
    border-radius: var(--radius-md, 0.5rem);
    font-weight: 600;
    font-size: 0.9375rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .btn-prev {
    background: transparent;
    border-color: var(--color-border, #E2E8F0);
    color: var(--color-text-body, #64748B);
  }
  .btn-prev:hover { background: var(--color-border, #E2E8F0); }
  .btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .btn-next {
    background: var(--color-accent, #1D4ED8);
    color: #FFFFFF;
  }
  .btn-next:hover { background: var(--color-text-primary, #04091A); }
</style>

<div class="wizard-container">
  <!-- Header / Progress -->
  <div class="wizard-header">
    <div class="wizard-progress">
      <div class="wizard-progress-bar" id="progress-bar" style="width: 0%;"></div>
      <div class="step-indicator active" data-step="1">1</div>
      <div class="step-indicator" data-step="2">2</div>
      <div class="step-indicator" data-step="3">3</div>
    </div>
    <div class="wizard-title" id="wizard-title">Account Details</div>
  </div>

  <!-- Form -->
  <form id="wizard-form" onsubmit="event.preventDefault();">
    <div class="wizard-body">
      
      <!-- Step 1 -->
      <div class="wizard-step active" id="step-1">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="john@example.com" required>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="wizard-step" id="step-2">
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input type="text" class="form-control" placeholder="Acme Corp">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control">
            <option>Developer</option>
            <option>Designer</option>
            <option>Manager</option>
          </select>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="wizard-step" id="step-3">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Min 8 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" required>
        </div>
      </div>
      
    </div>

    <!-- Footer -->
    <div class="wizard-footer">
      <button type="button" class="btn btn-prev" id="btn-prev" disabled>Back</button>
      <button type="button" class="btn btn-next" id="btn-next">Continue</button>
    </div>
  </form>
</div>

<script>
  const totalSteps = 3;
  let currentStep = 1;

  const titles = {
    1: "Account Details",
    2: "Company Profile",
    3: "Security"
  };

  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const progressBar = document.getElementById('progress-bar');
  const titleEl = document.getElementById('wizard-title');

  function updateWizard() {
    // Update active step visibility
    document.querySelectorAll('.wizard-step').forEach(step => step.classList.remove('active'));
    document.getElementById(`step-${currentStep}`).classList.add('active');

    // Update Progress Bar
    const progress = ((currentStep - 1) / (totalSteps - 1)) * 100;
    progressBar.style.width = `${progress}%`;

    // Update Indicators
    document.querySelectorAll('.step-indicator').forEach(ind => {
      const stepNum = parseInt(ind.getAttribute('data-step'));
      ind.classList.remove('active', 'completed');
      if (stepNum === currentStep) ind.classList.add('active');
      if (stepNum < currentStep) {
        ind.classList.add('completed');
        ind.innerHTML = '✓';
      } else {
        ind.innerHTML = stepNum;
      }
    });

    // Update Text & Buttons
    titleEl.textContent = titles[currentStep];
    btnPrev.disabled = currentStep === 1;
    btnNext.textContent = currentStep === totalSteps ? 'Complete' : 'Continue';
  }

  btnNext.addEventListener('click', () => {
    // Basic validation check could go here
    if (currentStep < totalSteps) {
      currentStep++;
      updateWizard();
    } else {
      alert("Form Submitted Successfully!");
      // Handle submit logic
    }
  });

  btnPrev.addEventListener('click', () => {
    if (currentStep > 1) {
      currentStep--;
      updateWizard();
    }
  });
</script>
