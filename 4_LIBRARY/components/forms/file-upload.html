<!-- Drag and Drop File Upload
     UX-UI System — 4_LIBRARY/components/forms/file-upload.html
-->

<style>
  .upload-container {
    max-width: 500px;
    margin: 2rem auto;
    font-family: var(--font-body, 'Inter', sans-serif);
  }
  
  .upload-zone {
    border: 2px dashed var(--color-border, #CBD5E1);
    border-radius: var(--radius-xl, 1rem);
    padding: 3rem 2rem;
    text-align: center;
    background: var(--color-bg-surface, #F8FAFC);
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
  }
  
  .upload-zone:hover {
    border-color: var(--color-accent-hover, #2563EB);
    background: var(--color-accent-light, #EFF6FF);
  }
  
  /* Drag state */
  .upload-zone.drag-active {
    border-color: var(--color-accent, #1D4ED8);
    background: var(--color-accent-light, #EFF6FF);
    transform: scale(1.02);
  }
  
  .upload-icon {
    width: 48px;
    height: 48px;
    color: var(--color-accent, #1D4ED8);
    margin: 0 auto 1rem;
    background: #FFFFFF;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  }
  
  .upload-title {
    font-weight: 600;
    color: var(--color-text-primary, #04091A);
    margin-bottom: 0.5rem;
  }
  
  .upload-desc {
    font-size: 0.875rem;
    color: var(--color-text-muted, #94A3B8);
  }
  
  /* Hide the actual file input */
  .file-input-hidden {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* File Preview List */
  .file-list {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    background: #FFFFFF;
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-md, 0.5rem);
    animation: slideUp 0.3s ease;
  }
  .file-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    overflow: hidden;
  }
  .file-icon {
    color: var(--color-text-muted, #94A3B8);
  }
  .file-name {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--color-text-primary, #04091A);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 250px;
  }
  .file-size {
    font-size: 0.75rem;
    color: var(--color-text-muted, #94A3B8);
  }
  .file-remove {
    background: transparent;
    border: none;
    color: #EF4444; /* red */
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .file-remove:hover {
    background: #FEE2E2;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="upload-container">
  <div class="upload-zone" id="drop-zone">
    <div class="upload-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-title">Click to upload or drag and drop</div>
    <div class="upload-desc">SVG, PNG, JPG or PDF (max. 10MB)</div>
    
    <input type="file" id="file-input" class="file-input-hidden" multiple accept="image/*,.pdf">
  </div>
  
  <div class="file-list" id="file-list"></div>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const fileList = document.getElementById('file-list');

  // Prevent default drag behaviors
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
    document.body.addEventListener(eventName, preventDefaults, false);
  });
  function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
  }

  // Highlight drop zone
  ['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
  });
  ['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
  });

  // Handle dropped files
  dropZone.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    const files = dt.files;
    handleFiles(files);
  });

  // Handle clicked files
  fileInput.addEventListener('change', function() {
    handleFiles(this.files);
  });

  function handleFiles(files) {
    [...files].forEach(file => {
      renderFilePreview(file);
    });
  }

  function renderFilePreview(file) {
    // Format size
    let size = (file.size / 1024).toFixed(2);
    let unit = 'KB';
    if (size > 1024) { size = (size / 1024).toFixed(2); unit = 'MB'; }

    const li = document.createElement('div');
    li.className = 'file-item';
    li.innerHTML = `
      <div class="file-info">
        <svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <div>
          <div class="file-name" title="${file.name}">${file.name}</div>
          <div class="file-size">${size} ${unit}</div>
        </div>
      </div>
      <button class="file-remove" aria-label="Remove file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;
    
    // Remove functionality
    li.querySelector('.file-remove').addEventListener('click', () => {
      li.remove();
    });

    fileList.appendChild(li);
  }
</script>
